<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Onpoint Base | On Point Group Operations Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, sans-serif; }
    body { background: #f0f4f8; height: 100vh; overflow: hidden; }
    .app { display: flex; height: 100vh; width: 100%; }
    .sidebar { width: 280px; background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
    .brand { padding: 28px 24px 20px 24px; font-size: 26px; font-weight: 700; border-bottom: 1px solid #1e293b; color: white; display: flex; align-items: center; gap: 10px; }
    .brand img { height: 38px; width: auto; border-radius: 8px; }
    .brand span { background: #3b82f6; padding: 2px 8px; border-radius: 8px; font-size: 20px; margin-left: 6px; }
    .org-name { padding: 12px 24px; font-size: 12px; color: #94a3b8; border-bottom: 1px solid #1e293b; }
    .nav { padding: 20px 16px; display: flex; flex-direction: column; gap: 4px; }
    .nav-section { padding: 8px 16px 4px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748b; }
    .nav-link { padding: 10px 16px; border-radius: 12px; font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.2s; color: #cbd5e1; display: flex; align-items: center; gap: 12px; }
    .nav-link:hover { background: #1e293b; color: white; }
    .nav-link.active { background: #3b82f6; color: white; }
    .nav-badge { margin-left: auto; min-width: 20px; height: 20px; border-radius: 999px; background: #ef4444; color: white; font-size: 11px; font-weight: 800; display: none; align-items: center; justify-content: center; }
    .main { flex: 1; overflow-y: auto; padding: 24px 32px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .page-title h1 { font-size: 28px; font-weight: 700; color: #0f172a; }
    .refresh-btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .kpi-card { background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; cursor: pointer; }
    .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 24px; margin-bottom: 32px; }
    .chart-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; padding: 20px; }
    canvas { max-height: 260px; width: 100%; }
    .panel { background: white; border-radius: 24px; border: 1px solid #e2e8f0; margin-bottom: 32px; overflow: hidden; }
    .panel-header { padding: 20px 24px; border-bottom: 1px solid #eef2ff; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .btn-primary { background: #3b82f6; border: none; padding: 8px 18px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; }
    .btn-secondary { background: #eef2ff; border: none; padding: 8px 18px; border-radius: 40px; color: #1e40af; font-weight: 600; cursor: pointer; }
    .btn-whatsapp { background: #25D366; border: none; padding: 8px 18px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 14px 16px; background: #f8fafc; font-weight: 700; border-bottom: 1px solid #e2e8f0; }
    td { padding: 12px 16px; border-bottom: 1px solid #f0f2f5; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 40px; font-size: 11px; font-weight: 700; }
    .badge-high { background: #fee2e2; color: #991b1b; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-low { background: #dcfce7; color: #166534; }
    .badge-review { background: #dbeafe; color: #1e3a8a; }
    .badge-closed { background: #e2e3e5; color: #2d3748; }
    .message-bar { margin: 12px 0 0 0; padding: 10px 16px; border-radius: 14px; display: none; }
    .message-success { background: #dcfce7; color: #166534; border-left: 3px solid #22c55e; }
    .message-error { background: #fee2e2; color: #991b1b; }
    .deadline-timer { display: inline-flex; align-items: center; gap: 7px; padding: 6px 10px; border-radius: 999px; background: #eef2ff; font-size: 12px; font-weight: 800; }
    .api-response-box { background: #0f172a; color: #e2e8f0; border-radius: 14px; padding: 14px; font-family: monospace; overflow: auto; }
    .status-stat-card { background: white; border-radius: 20px; padding: 16px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
    .status-stat-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
    .task-status-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .score-pill { display: inline-block; min-width: 58px; text-align: center; padding: 5px 10px; border-radius: 40px; font-size: 12px; font-weight: 800; }
    .score-good { background: #dcfce7; color: #166534; }
    .connection-status { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 40px; font-size: 12px; font-weight: 800; background: white; }
    .login-screen { min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
    .login-card { width: 100%; max-width: 440px; background: white; border-radius: 28px; padding: 32px; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    input, select, textarea { border: 1px solid #cbd5e1; border-radius: 14px; padding: 10px 12px; font-size: 14px; }
    .exec-dashboard-theme .sidebar { display: none; }
    .exec-dashboard-theme .app { display: block; height: auto; min-height: 100vh; }
    .exec-dashboard-theme .main { padding: 0; overflow: visible; background: #eef2f6; }
    .exec-shell { min-height: 100vh; background: #eef2f6; }
    .exec-header { position: sticky; top: 0; z-index: 20; display: flex; justify-content: space-between; align-items: center; padding: 18px 34px; background: rgba(255,255,255,0.96); border-top: 3px solid #0ea5e9; border-bottom: 1px solid #d9e1ea; flex-wrap: wrap; gap: 16px; }
    .exec-brand { display: flex; gap: 14px; align-items: center; }
    .exec-logo-img { height: 42px; width: auto; border-radius: 12px; }
    .exec-brand-title { font-size: 21px; font-weight: 900; color: #0f172a; }
    .exec-controls { display: flex; gap: 18px; align-items: center; }
    .exec-user { display: flex; gap: 16px; align-items: center; font-weight: 900; }
    .exec-role { background: #e0f2fe; border-radius: 9px; padding: 7px 13px; font-size: 13px; }
    .exec-nav-wrap { padding: 0 34px 20px; }
    .exec-nav { display: flex; overflow-x: auto; background: rgba(255,255,255,.72); border-bottom: 1px solid #dbe3ec; gap: 4px; }
    .exec-nav button { background: transparent; border: 0; padding: 16px 22px; font-size: 16px; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
    .exec-nav button.active { color: #0f172a; border-bottom-color: #0ea5e9; }
    .exec-nav button.create { margin-left: auto; color: #0369a1; background: #f0f9ff; border-radius: 12px; border: 1px solid #0ea5e9; }
    .exec-content { padding: 22px 34px 50px; }
    .exec-section-title { color: #8a96a8; text-transform: uppercase; letter-spacing: .22em; font-size: 13px; font-weight: 800; margin: 20px 0 16px; }
    .exec-top-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; padding: 24px 34px 10px; }
    .exec-top-card { background: white; border: 1px solid #dbe3ec; border-radius: 17px; padding: 20px; cursor: pointer; }
    .exec-big { font-size: 38px; font-weight: 950; }
    .exec-red { color: #dc3f43; }
    .exec-blue { color: #0b82bf; }
    .create-task-buttons { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .closed-tickets-summary { background: white; border-radius: 20px; margin-bottom: 24px; padding: 16px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
    .closed-tickets-summary:hover { border-color: #3b82f6; }
    @media (max-width: 768px) { .exec-top-cards { grid-template-columns: 1fr 1fr; } .exec-header { flex-direction: column; align-items: flex-start; } .exec-controls { width: 100%; justify-content: space-between; } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Embed Logo as Base64 (simple placeholder PNG data URL) -->
</head>
<body>
<div id="loginScreen" class="login-screen"><div class="login-card"><h1>OnpointBase Login</h1><p>Sign in with your credentials</p><div class="form-field"><label>Email</label><input id="loginEmail" type="email"></div><div class="form-field"><label>Password</label><input id="loginPassword" type="password"></div><div class="login-actions"><button class="btn-primary" id="loginBtn">Sign in</button></div><div id="loginMessage" class="message-bar"></div></div></div>
<div class="app" id="appShell" style="display:none">
  <aside class="sidebar"><div class="brand"><img id="brandLogo" alt="Logo" style="height:36px">Onpoint<span>Base</span></div><div class="org-name">🏢 On Point Group</div><div class="nav"><div class="nav-link active" data-section="dashboard">📊 Dashboard</div><div class="nav-link" data-section="myTickets">📥 My Tickets</div><div class="nav-link" data-section="closedTicketsArchive">📦 Closed Tickets</div><div class="nav-link" data-section="tickets">🎫 All Tickets</div><div class="nav-link" data-section="users">👥 Users</div><div class="nav-link" data-section="settings">⚙️ Settings</div></div></aside>
  <main class="main" id="mainContent"><div class="loading"><div class="spinner"></div><p>Loading...</p></div></main>
</div>
<script>
  // ========== CONFIG & GLOBALS ==========
  const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx9PYzLBN9LC7z2GH6elQRX_X81SQHqfZLJAky_mCbvwl0IZEzT6AwIn3UDlvmuXRDI/exec';
  const SHEET_ID = '1KWYWSUmwGYcBVIuDzh7yo86eTrfnMZX35DuGnRAVNv8';
  let SCRIPT_URL = localStorage.getItem('quickbase_api_url') || DEFAULT_SCRIPT_URL;
  let currentUser = null;
  let currentSection = 'dashboard';
  let charts = {};
  let cachedPeopleRows = [];
  // Closed tickets archive storage (in-memory + localStorage)
  let closedTicketsArchive = [];

  function loadClosedArchive() { try { closedTicketsArchive = JSON.parse(localStorage.getItem('onpoint_closed_tickets') || '[]'); } catch(e) { closedTicketsArchive = []; } }
  function saveClosedArchive() { localStorage.setItem('onpoint_closed_tickets', JSON.stringify(closedTicketsArchive)); }
  loadClosedArchive();

  const SYSTEM_USER_EMAILS = { 'Lameck Chindove': 'lameck@onpoint.co.za', 'Tafadzwa Magejo': 'tafadzwa@onpoint.co.za', 'System Admin': 'admin@onpoint.co.za' };
  const EXECUTIVE_MANAGERS = [{ name: 'Lameck Chindove', email: 'lameck@onpoint.co.za' }, { name: 'Tafadzwa Magejo', email: 'tafadzwa@onpoint.co.za' }];
  function isExecutive() { return currentUser && (currentUser.Roles === 'executive' || EXECUTIVE_MANAGERS.some(e => e.email === currentUser.Email)); }
  function isTicketIssuer(task) { return task.createdByEmail === currentUser?.Email || task['Created By'] === currentUser?.['Full Name']; }
  function canCloseTicket(task) { if (isExecutive()) return true; return isTicketIssuer(task); } // issuer OR executive
  function isDepartmentManager() { return currentUser?.Roles === 'manager'; } // manager can close only after issuer? but spec: issuer first, then manager. we implement: issuer can close, or executive always. manager after issuer not in MVP but we add simple: only issuer or exec
  function getCurrentUserName() { return currentUser?.['Full Name'] || currentUser?.Email || ''; }
  function getAssigneeName(t) { return t['Assigned To'] || t.assignedTo || ''; }
  function getTicketIdentity(t) { return t['Ticket ID'] || t.ticketId || t.id || ''; }
  function getTaskDueDate(t) { return t['Due Date'] || t.dueDate || ''; }
  function escapeHtml(s) { return String(s || '').replace(/[&<>]/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }

  async function apiGet(action) { const url = `${SCRIPT_URL}?action=${action}&sheetId=${SHEET_ID}&_=${Date.now()}`; const res = await fetch(url); const json = await res.json(); return Array.isArray(json) ? json : (json.data || []); }
  async function apiPost(action, payload) { const res = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload, user: currentUser, sheetId: SHEET_ID }) }); return await res.json(); }

  // Move ticket to Closed Archive and remove from active
  async function closeTicketAndArchive(task, executiveRating = null) {
    const ticketId = getTicketIdentity(task) || `TKT-${Date.now()}`;
    const closedRecord = { ...task, closedAt: new Date().toISOString(), closedBy: currentUser?.Email, finalStatus: 'Closed', executiveRating };
    closedTicketsArchive.push(closedRecord);
    saveClosedArchive();
    // Simulate removal from active tasks (in real app we'd update sheet status to Closed)
    try { await apiPost('updateTicketStatus', { ticketId, status: 'Closed', closedBy: currentUser?.Email, sheetTab: 'Tasks' }); } catch(e) { console.warn(e); }
    alert(`Ticket ${ticketId} closed and moved to Closed Tickets archive.`);
  }

  // After assignee submits update => move to Review Basket (status = "Awaiting Review")
  async function submitTaskUpdateAndMoveToReview(task, comment, proofLinks) {
    const ticketId = getTicketIdentity(task);
    if (!ticketId) return alert("Missing ticket ID");
    await apiPost('updateTicketStatus', { ticketId, status: 'Awaiting Review', assigneeComment: comment, proofLink: proofLinks.join(','), sheetTab: 'Tasks' });
    alert("Task updated and moved to Review Basket (Awaiting Review).");
    await renderMyTickets();
  }

  // Render My Tickets with "Submit" button that moves to Review
  async function renderMyTickets() {
    let tickets = await apiGet('tickets');
    tickets = (tickets || []).filter(t => getAssigneeName(t) === getCurrentUserName() && t.Status !== 'Closed' && t.Status !== 'Awaiting Review');
    const main = document.getElementById('mainContent');
    main.innerHTML = `<div class="top-bar"><div class="page-title"><h1>My Tickets</h1><p>Assigned to me</p></div><button class="refresh-btn" onclick="renderMyTickets()">↻ Refresh</button></div>
      <div class="panel"><div class="panel-header"><h2>📋 My Open Tasks</h2></div><div class="table-wrapper"><table><thead><tr><th>ID</th><th>Title</th><th>Due Date</th><th>Action</th></tr></thead><tbody>${tickets.map(t => `<tr><td>${escapeHtml(getTicketIdentity(t))}</td><td>${escapeHtml(t.Title)}</td><td>${escapeHtml(getTaskDueDate(t))}</td><td><button class="btn-primary" onclick="showUpdateForm('${escapeHtml(getTicketIdentity(t))}')">Submit Update → Review</button></td></tr>`).join('')}</tbody></table></div></div>`;
  }

  window.showUpdateForm = function(ticketId) {
    const comment = prompt("Enter completion comment / proof links (URLs):");
    if (comment !== null) submitTaskUpdateAndMoveToReview({ TicketID: ticketId, Title: 'task' }, comment, []);
  };

  // Render Closed Tickets Archive
  async function renderClosedTicketsArchive() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `<div class="top-bar"><div class="page-title"><h1>📦 Closed Tickets Archive</h1><p>All tickets that have been closed</p></div><button class="refresh-btn" onclick="renderClosedTicketsArchive()">↻ Refresh</button></div>
      <div class="panel"><div class="table-wrapper"><table><thead><tr><th>Ticket ID</th><th>Title</th><th>Closed By</th><th>Closed At</th><th>Status</th></tr></thead><tbody>${closedTicketsArchive.map(t => `<tr><td>${escapeHtml(getTicketIdentity(t))}</td><td>${escapeHtml(t.Title)}</td><td>${escapeHtml(t.closedBy)}</td><td>${escapeHtml(t.closedAt)}</td><td>Closed</td></tr>`).join('') || '<tr><td colspan="5">No closed tickets yet</td></tr>'}</tbody></table></div></div>`;
  }

  // All Tickets with "Close" button (issuer or executive)
  async function renderAllTickets() {
    let tickets = await apiGet('tickets');
    tickets = tickets || [];
    const main = document.getElementById('mainContent');
    main.innerHTML = `<div class="top-bar"><div class="page-title"><h1>All Tickets</h1></div><button class="refresh-btn" onclick="renderAllTickets()">↻ Refresh</button></div>
      <div class="panel"><div class="table-wrapper"><table><thead><tr><th>ID</th><th>Title</th><th>Assigned To</th><th>Status</th><th>Due</th><th>Action</th></tr></thead><tbody>${tickets.map(t => `<tr><td>${escapeHtml(getTicketIdentity(t))}</td><td>${escapeHtml(t.Title)}</td><td>${escapeHtml(getAssigneeName(t))}</td><td>${escapeHtml(t.Status)}</td><td>${escapeHtml(getTaskDueDate(t))}</td><td>${(canCloseTicket(t) && t.Status !== 'Closed') ? `<button class="btn-secondary" onclick="closeTicketFromList('${escapeHtml(getTicketIdentity(t))}')">Close Ticket</button>` : (t.Status === 'Closed' ? 'Closed' : '—')}</td></tr>`).join('')}</tbody></table></div></div>`;
  }
  window.closeTicketFromList = async function(id) {
    let tickets = await apiGet('tickets');
    const task = tickets.find(t => getTicketIdentity(t) === id);
    if (!task) return alert("Not found");
    if (!canCloseTicket(task)) return alert("Only the ticket issuer or an Executive can close this ticket.");
    if (confirm(`Close ticket ${id}? It will move to Archive.`)) { await closeTicketAndArchive(task); renderAllTickets(); }
  };

  // Dashboard: shows Create buttons next to Compact button
  async function renderDashboard() {
    document.body.classList.add('exec-dashboard-theme');
    const main = document.getElementById('mainContent');
    const tickets = await apiGet('tickets');
    const myOpen = (tickets || []).filter(t => getAssigneeName(t) === getCurrentUserName() && t.Status !== 'Closed' && t.Status !== 'Awaiting Review').length;
    const reviewBasket = (tickets || []).filter(t => t.Status === 'Awaiting Review' && isExecutive()).length;
    main.innerHTML = `<div class="exec-shell">
      <div class="exec-header"><div class="exec-brand"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230f172a'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='%233b82f6' font-weight='bold'%3E◇%3C/text%3E%3C/svg%3E" class="exec-logo-img"><div class="exec-brand-title">OnpointBase · Ops</div></div><div class="exec-controls"><button class="exec-control create" id="createTaskOnceBtn">➕ Once Off (New Task)</button><button class="exec-control create" id="createAutoTaskBtn">🔄 Recurring Task</button><button class="exec-control">▣ Compact</button></div><div class="exec-user"><span class="exec-role">${isExecutive() ? 'EXECUTIVE' : 'USER'}</span><span>${escapeHtml(getCurrentUserName())}</span></div></div>
      <div class="exec-top-cards"><div class="exec-top-card" onclick="currentSection='myTickets';loadCurrentSection()"><div class="exec-label">My Open Tasks</div><div class="exec-big">${myOpen}</div></div><div class="exec-top-card" onclick="currentSection='tickets';window.reviewFilter=true;loadCurrentSection()"><div class="exec-label">Review Basket</div><div class="exec-big exec-blue">${reviewBasket}</div></div><div class="exec-top-card" onclick="currentSection='closedTicketsArchive';loadCurrentSection()"><div class="exec-label">Closed Archive</div><div class="exec-big">${closedTicketsArchive.length}</div></div></div>
      <div class="exec-nav-wrap"><div class="exec-nav"><button class="active" onclick="currentSection='dashboard';loadCurrentSection()">Home</button><button onclick="currentSection='myTickets';loadCurrentSection()">My Tickets</button><button onclick="currentSection='tickets';loadCurrentSection()">All Tickets</button><button onclick="currentSection='closedTicketsArchive';loadCurrentSection()">Archive</button></div></div>
      <div class="exec-content"><div class="exec-section-title">Quick Actions</div><div class="create-task-buttons"><button class="btn-primary" id="quickOnceBtn">➕ New Single Task</button><button class="btn-secondary" id="quickRecurringBtn">🔄 New Recurring Task</button></div></div></div>`;
    document.getElementById('quickOnceBtn')?.addEventListener('click', () => { alert("Open form: Once-off task (Title, Assignee, Due Date)"); });
    document.getElementById('quickRecurringBtn')?.addEventListener('click', () => { alert("Open form: Recurring task (Frequency, Day)"); });
    document.getElementById('createTaskOnceBtn')?.addEventListener('click', () => { alert("Create Once-off Task"); });
    document.getElementById('createAutoTaskBtn')?.addEventListener('click', () => { alert("Create Recurring Task"); });
  }

  // Tickets view with Review Basket filter for executives
  async function renderTicketsWithReview() {
    let tickets = await apiGet('tickets');
    tickets = tickets || [];
    const reviewFilter = window.reviewFilter === true;
    const displayTickets = reviewFilter && isExecutive() ? tickets.filter(t => t.Status === 'Awaiting Review') : tickets;
    const main = document.getElementById('mainContent');
    main.innerHTML = `<div class="top-bar"><div class="page-title"><h1>${reviewFilter ? 'Review Basket' : 'All Tickets'}</h1></div><button class="refresh-btn" onclick="renderTicketsWithReview()">↻ Refresh</button></div>
      <div class="panel"><div class="table-wrapper"><table><thead><tr><th>ID</th><th>Title</th><th>Assigned To</th><th>Status</th><th>Due</th><th>Action</th></tr></thead><tbody>${displayTickets.map(t => `<tr><td>${escapeHtml(getTicketIdentity(t))}</td><td>${escapeHtml(t.Title)}</td><td>${escapeHtml(getAssigneeName(t))}</td><td>${escapeHtml(t.Status)}</td><td>${escapeHtml(getTaskDueDate(t))}</td><td>${(canCloseTicket(t) && t.Status !== 'Closed') ? `<button class="btn-secondary" onclick="closeTicketFromList('${escapeHtml(getTicketIdentity(t))}')">Close & Archive</button>` : (t.Status === 'Awaiting Review' ? '<span class="badge badge-review">Pending Review</span>' : '—')}</td></tr>`).join('')}</tbody></table></div></div>`;
  }

  // Users mock
  async function renderUsers() { const main = document.getElementById('mainContent'); main.innerHTML = `<div class="panel"><div class="panel-header"><h2>Users</h2></div><div>User management (simplified)</div></div>`; }
  async function renderSettings() { const main = document.getElementById('mainContent'); main.innerHTML = `<div class="panel"><div class="panel-header"><h2>Settings</h2></div><div>API URL: ${SCRIPT_URL}</div></div>`; }

  async function loadCurrentSection() {
    if (!currentUser) { showLoginScreen(); return; }
    document.body.classList.add('exec-dashboard-theme');
    if (currentSection === 'dashboard') await renderDashboard();
    else if (currentSection === 'myTickets') await renderMyTickets();
    else if (currentSection === 'closedTicketsArchive') await renderClosedTicketsArchive();
    else if (currentSection === 'tickets') { window.reviewFilter = false; await renderTicketsWithReview(); }
    else if (currentSection === 'users') await renderUsers();
    else if (currentSection === 'settings') await renderSettings();
    else await renderDashboard();
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    const activeNav = document.querySelector(`.nav-link[data-section="${currentSection}"]`);
    if (activeNav) activeNav.classList.add('active');
  }

  // Login mock (simple)
  async function loginUser() {
    const email = document.getElementById('loginEmail').value.trim();
    const pwd = document.getElementById('loginPassword').value;
    if (email === 'exec@onpoint.co.za' && pwd === 'exec') currentUser = { Email: email, 'Full Name': 'Executive User', Roles: 'executive' };
    else if (email === 'user@onpoint.co.za' && pwd === 'user') currentUser = { Email: email, 'Full Name': 'Normal User', Roles: 'user' };
    else { alert("Invalid. Use exec@onpoint.co.za / exec"); return; }
    localStorage.setItem('quickbase_user', JSON.stringify(currentUser));
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    await loadCurrentSection();
  }
  function showLoginScreen() { document.getElementById('appShell').style.display = 'none'; document.getElementById('loginScreen').style.display = 'flex'; }
  function logout() { currentUser = null; localStorage.removeItem('quickbase_user'); showLoginScreen(); }
  document.getElementById('loginBtn')?.addEventListener('click', loginUser);
  (function initLogo() { const logoImg = document.getElementById('brandLogo'); if(logoImg) logoImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230f172a'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='%233b82f6' font-weight='bold'%3E◇%3C/text%3E%3C/svg%3E"; })();
  if (localStorage.getItem('quickbase_user')) { try { currentUser = JSON.parse(localStorage.getItem('quickbase_user')); document.getElementById('loginScreen').style.display = 'none'; document.getElementById('appShell').style.display = 'flex'; loadCurrentSection(); } catch(e) { showLoginScreen(); } } else { showLoginScreen(); }
  window.closeTicketFromList = closeTicketFromList;
  window.submitTaskUpdateAndMoveToReview = submitTaskUpdateAndMoveToReview;
  window.renderMyTickets = renderMyTickets;
  window.renderTicketsWithReview = renderTicketsWithReview;
  window.renderClosedTicketsArchive = renderClosedTicketsArchive;
  window.renderAllTickets = renderAllTickets;
  window.logout = logout;
</script>
</body>
